<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tournaments — Gauntlet Tiers</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .t-page { padding: 2rem; max-width: 1050px; margin: 0 auto; }

    /* ── CREATE FORM ── */
    .create-form {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.75rem;
      margin-bottom: 2rem;
      display: none;
      animation: fadeSlideUp 0.3s ease both;
    }
    .create-form.open { display: block; }
    .create-form h3 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      margin-bottom: 1.25rem; padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 1rem; margin-bottom: 1rem;
    }
    .form-row .form-group { margin-bottom: 0; }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center;
    }
    .filter-bar span {
      font-family: 'Rajdhani', sans-serif; font-size: 0.72rem;
      font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-muted); margin-right: 0.25rem;
    }

    /* ── TOURNAMENT CARD ── */
    .t-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 1.25rem;
      transition: border-color 0.2s;
    }
    .t-card:hover { border-color: var(--border-accent); }

    .t-card-header {
      padding: 1.1rem 1.5rem;
      display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap; gap: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .t-card-header h3 {
      font-family: 'Rajdhani', sans-serif; font-size: 1.1rem;
      font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
    }
    .t-card-actions { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }

    .t-status {
      font-family: 'Rajdhani', sans-serif; font-size: 0.7rem;
      font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      padding: 0.22rem 0.65rem; border-radius: 3px;
    }
    .s-upcoming { background: rgba(52,152,219,0.12); border: 1px solid rgba(52,152,219,0.3); color: #3498db; }
    .s-ongoing  { background: rgba(46,204,113,0.12); border: 1px solid rgba(46,204,113,0.3); color: #2ecc71; }
    .s-finished { background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text-muted); }

    .t-card-meta {
      padding: 1rem 1.5rem;
      display: flex; gap: 2rem; flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .t-meta-item { display: flex; flex-direction: column; gap: 0.2rem; }
    .t-meta-label {
      font-family: 'Rajdhani', sans-serif; font-size: 0.68rem;
      font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted);
    }
    .t-meta-value { font-size: 0.88rem; color: var(--text-primary); font-weight: 600; }

    /* ── PLAYERS PANEL ── */
    .t-players-panel {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .t-players-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 0.75rem;
    }
    .t-players-title {
      font-family: 'Rajdhani', sans-serif; font-size: 0.72rem;
      font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted);
    }
    .t-add-row {
      display: flex; gap: 0.5rem; margin-bottom: 0.75rem;
    }
    .t-add-row input {
      flex: 1; background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: 4px; padding: 0.45rem 0.75rem;
      color: var(--text-primary); font-family: 'Exo 2', sans-serif; font-size: 0.85rem; outline: none;
    }
    .t-add-row input:focus { border-color: var(--accent-gold); }

    .t-players-list {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
    }
    .t-player-chip {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: 4px; padding: 0.25rem 0.6rem;
      font-size: 0.82rem; color: var(--text-primary);
    }
    .t-player-chip .remove-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 0.9rem; line-height: 1;
      padding: 0; transition: color 0.15s;
    }
    .t-player-chip .remove-btn:hover { color: var(--accent-red); }

    /* ── BRACKET ── */
    .t-bracket-toggle-bar {
      padding: 0.7rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .t-bracket-toggle {
      font-family: 'Rajdhani', sans-serif; font-size: 0.72rem;
      font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--text-muted); background: transparent; border: none;
      cursor: pointer; padding: 0; transition: color 0.15s;
    }
    .t-bracket-toggle:hover { color: var(--accent-gold); }

    .t-bracket-wrap {
      display: none; overflow-x: auto;
      padding: 1.25rem 1.5rem 1.5rem;
    }
    .t-bracket-wrap.open { display: block; }

    .t-bracket-inner {
      display: flex; gap: 1.25rem; min-width: max-content; align-items: flex-start;
    }

    .b-round { display: flex; flex-direction: column; min-width: 170px; }
    .b-round-label {
      font-family: 'Rajdhani', sans-serif; font-size: 0.68rem;
      font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 0.6rem;
    }
    .b-matches { display: flex; flex-direction: column; gap: 0.6rem; }

    .b-match {
      background: var(--bg-secondary);
      border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
    }
    .b-match.bye-match { opacity: 0.5; }

    .b-player {
      padding: 0.4rem 0.7rem;
      font-size: 0.82rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .b-player:last-child { border-bottom: none; }
    .b-player.winner { color: var(--accent-gold); font-weight: 600; background: rgba(212,160,23,0.06); }
    .b-player.bye    { color: var(--text-muted); font-style: italic; font-size: 0.75rem; }
    .b-player.tbd    { color: var(--text-muted); font-style: italic; font-size: 0.78rem; }

    .b-bye-label {
      font-family: 'Rajdhani', sans-serif; font-size: 0.6rem;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--accent-gold); opacity: 0.7;
    }

    /* ── EMPTY ── */
    .t-empty {
      text-align: center; padding: 4rem 2rem; color: var(--text-muted);
    }
    .t-empty strong {
      display: block; font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem; letter-spacing: 1px; margin-bottom: 0.5rem;
    }
  </style>
</head>

<main>
  <div class="page-header">
    <h1>Tournaments</h1>
    <p>Competitive events across all PvP game modes</p>
  </div>

  <div class="t-page">

    <!-- Admin bar -->
    <div id="admin-bar" style="display:none;margin-bottom:1.25rem;">
      <button class="btn-primary" id="toggle-create-btn">+ Create Tournament</button>
    </div>

    <!-- Create form -->
    <div class="create-form" id="create-form">

      <div class="alert error" id="create-error"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="t-name" placeholder="GT Sword Open #1" />
        </div>
        <div class="form-group">

          <select id="t-mode">
            <option value="sword">Sword</option>

            <option value="axe">Axe</option>
            <option value="uhc">UHC</option>
            <option value="pot">Pot</option>
            <option value="crystal">Crystal</option>
            <option value="smp">SMP</option>
            <option value="vanilla">Vanilla</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="t-date" />
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="t-status">
            <option value="upcoming">Upcoming</option>
            <option value="ongoing">Ongoing</option>
            <option value="finished">Finished</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Description (optional)</label>

      </div>
      <div style="display:flex;gap:0.75rem;margin-top:0.5rem;">

      <span>Filter:</span>
      <button class="mode-tab active" data-filter="all">All</button>
      <button class="mode-tab" data-filter="upcoming">Upcoming</button>

<script src="../js/toast.js"></script>
<script src="../js/skeleton.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/api.js"></script>
<script>
  let allTournaments = [];
  let currentFilter  = 'all';
  let isAdmin        = false;

  function esc(s) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(String(s || '')));
    return d.innerHTML;
  }

  // ── Init ───────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    const user = getUser();
    isAdmin = !!(user && user.is_admin);
    if (isAdmin) document.getElementById('admin-bar').style.display = 'block';

    document.getElementById('toggle-create-btn').onclick = () => toggleForm(true);
    document.getElementById('cancel-create-btn').onclick = () => toggleForm(false);
    document.getElementById('create-btn').onclick = createTournament;

    document.querySelectorAll('[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderList();
      });
    });

    load();
  });

  function toggleForm(open) {
    document.getElementById('create-form').classList.toggle('open', open);
    document.getElementById('toggle-create-btn').textContent = open ? '✕ Cancel' : '+ Create Tournament';
  }

  // ── Load ───────────────────────────────────────────────
  async function load() {
    document.getElementById('t-list').innerHTML = skeleton.tournamentCards(3);
    try {
      const data = await apiFetch('/tournaments');
      allTournaments = data.tournaments || [];
    } catch(e) {
      allTournaments = demoData();
    }
    renderList();
  }

  // ── Render list ────────────────────────────────────────
  function renderList() {
    const list = document.getElementById('t-list');
    let items  = allTournaments;
    if (currentFilter !== 'all') items = items.filter(t => t.status === currentFilter);

    if (!items.length) {
      list.innerHTML = `<div class="t-empty"><strong>No ${currentFilter === 'all' ? '' : currentFilter + ' '}tournaments yet</strong><p>Check back soon or join our Discord.</p></div>`;
      return;
    }
    list.innerHTML = items.map((t, i) => renderCard(t, i)).join('');
  }

  // ── Render one card ────────────────────────────────────
  function renderCard(t, i) {
    const statusClass = { upcoming:'s-upcoming', ongoing:'s-ongoing', finished:'s-finished' };
    const statusLabel = { upcoming:'Upcoming', ongoing:'Ongoing', finished:'Finished' };
    const dateStr = t.date
      ? new Date(t.date).toLocaleDateString('en-US', { day:'numeric', month:'long', year:'numeric' })
      : 'TBA';
    const players = t.players || [];
    const bracket = t.bracket || buildBracketClient(players);
    const roundNames = getRoundNames(bracket.length);

    const adminActions = isAdmin ? `
      <select onchange="changeStatus('${t.id}', this.value)" style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);padding:0.25rem 0.5rem;font-size:0.78rem;font-family:'Exo 2',sans-serif;">
        <option value="upcoming" ${t.status==='upcoming'?'selected':''}>Upcoming</option>
        <option value="ongoing"  ${t.status==='ongoing' ?'selected':''}>Ongoing</option>
        <option value="finished" ${t.status==='finished'?'selected':''}>Finished</option>
      </select>
      <button class="btn-danger" style="padding:0.25rem 0.65rem;font-size:0.72rem;" onclick="deleteTournament('${t.id}')">Delete</button>
    ` : '';

    const playersPanel = isAdmin ? `
      <div class="t-players-panel">
        <div class="t-players-header">
          <span class="t-players-title">Players (${players.length})</span>
        </div>
        <div class="t-add-row">
          <input type="text" id="add-input-${t.id}" placeholder="Add player username..." onkeydown="if(event.key==='Enter') addPlayer('${t.id}')" />
          <button class="btn-primary" style="padding:0.45rem 1rem;white-space:nowrap;" onclick="addPlayer('${t.id}')">Add</button>
        </div>
        <div class="t-players-list" id="chips-${t.id}">
          ${players.map(p => playerChip(t.id, p)).join('')}
          ${players.length === 0 ? '<span style="color:var(--text-muted);font-size:0.82rem;">No players yet.</span>' : ''}
        </div>
      </div>
    ` : `
      <div class="t-players-panel">
        <div class="t-players-header">
          <span class="t-players-title">Players (${players.length})</span>
        </div>
        <div class="t-players-list">
          ${players.map(p => `<span class="t-player-chip">${esc(p)}</span>`).join('')}
          ${players.length === 0 ? '<span style="color:var(--text-muted);font-size:0.82rem;">No players registered yet.</span>' : ''}
        </div>
      </div>
    `;

    const bracketHtml = bracket.length > 0 ? `
      <div class="t-bracket-toggle-bar">
        <button class="t-bracket-toggle" onclick="toggleBracket(this)">▼ View Bracket</button>
      </div>
      <div class="t-bracket-wrap">
        <div class="t-bracket-inner">
          ${bracket.map((round, ri) => `
            <div class="b-round">
              <div class="b-round-label">${roundNames[ri] || 'Round ' + (ri+1)}</div>
              <div class="b-matches">
                ${round.map(m => renderMatch(m)).join('')}
              </div>
            </div>`).join('')}
        </div>
      </div>
    ` : '';

    return `
      <div class="t-card" id="tcard-${t.id}" style="animation:fadeSlideUp 0.4s ease ${i*0.06}s both;">
        <div class="t-card-header">
          <h3>${esc(t.name)}</h3>
          <div class="t-card-actions">
            <span class="t-status ${statusClass[t.status]||'s-upcoming'}">${statusLabel[t.status]||t.status}</span>
            ${adminActions}
          </div>
        </div>
        <div class="t-card-meta">
          <div class="t-meta-item">
            <span class="t-meta-label">Mode</span>
            <span class="t-meta-value">${esc((t.mode||'').toUpperCase())}</span>
          </div>
          <div class="t-meta-item">
            <span class="t-meta-label">Date</span>
            <span class="t-meta-value">${dateStr}</span>
          </div>
          <div class="t-meta-item">
            <span class="t-meta-label">Players</span>
            <span class="t-meta-value">${players.length}</span>
          </div>
          ${t.description ? `
          <div class="t-meta-item" style="flex:1;min-width:180px;">
            <span class="t-meta-label">Info</span>
            <span class="t-meta-value" style="font-weight:400;color:var(--text-secondary);font-size:0.85rem;">${esc(t.description)}</span>
          </div>` : ''}
        </div>
        ${playersPanel}
        ${bracketHtml}
      </div>`;
  }

  function playerChip(tid, username) {
    return `
      <span class="t-player-chip">
        ${esc(username)}
        <button class="remove-btn" title="Remove" onclick="removePlayer('${tid}','${esc(username)}')">✕</button>
      </span>`;
  }

  // ── Render one bracket match ────────────────────────────
  function renderMatch(m) {
    const isBye = m.bye;
    return `
      <div class="b-match ${isBye ? 'bye-match' : ''}">
        <div class="b-player ${m.p1 === 'BYE' ? 'bye' : ''} ${m.winner === m.p1 && !isBye ? 'winner' : ''}">
          <span>${m.p1 === 'BYE' ? 'BYE' : m.p1 === 'TBD' ? '?' : esc(m.p1)}</span>
          ${isBye && m.winner === m.p1 ? '<span class="b-bye-label">AUTO</span>' : ''}
        </div>
        <div class="b-player ${m.p2 === 'BYE' ? 'bye' : ''} ${m.winner === m.p2 && !isBye ? 'winner' : ''}">
          <span>${m.p2 === 'BYE' ? 'BYE' : m.p2 === 'TBD' ? '?' : esc(m.p2)}</span>
          ${isBye && m.winner === m.p2 ? '<span class="b-bye-label">AUTO</span>' : ''}
        </div>
      </div>`;
  }

  // ── Round names based on total rounds ──────────────────
  function getRoundNames(total) {
    if (total === 1) return ['Final'];
    if (total === 2) return ['Semi-finals', 'Final'];
    if (total === 3) return ['Quarter-finals', 'Semi-finals', 'Final'];
    if (total === 4) return ['Round of 16', 'Quarter-finals', 'Semi-finals', 'Final'];
    const names = [];
    for (let i = 0; i < total - 3; i++) names.push(`Round ${i+1}`);
    return [...names, 'Quarter-finals', 'Semi-finals', 'Final'];
  }

  // ── Bracket builder (client-side mirror of server) ─────
  function buildBracketClient(players) {
    const n = players.length;
    if (n < 2) return [];

    let slots = 1;
    while (slots < n) slots *= 2;

    const seeded = [...players];
    while (seeded.length < slots) seeded.push('BYE');

    const rounds = [];
    let current  = seeded;

    while (current.length > 1) {
      const matches   = [];
      const nextRound = [];
      for (let i = 0; i < current.length; i += 2) {
        const p1 = current[i], p2 = current[i+1];
        if (p2 === 'BYE') {
          matches.push({ p1, p2:'BYE', winner:p1, bye:true });
          nextRound.push(p1);
        } else if (p1 === 'BYE') {
          matches.push({ p1:'BYE', p2, winner:p2, bye:true });
          nextRound.push(p2);
        } else {
          matches.push({ p1, p2, winner:null, bye:false });
          nextRound.push('TBD');
        }
      }
      rounds.push(matches);
      current = nextRound;
    }
    return rounds;
  }

  // ── Toggle bracket ─────────────────────────────────────
  function toggleBracket(btn) {
    const wrap = btn.closest('.t-card').querySelector('.t-bracket-wrap');
    const open = wrap.classList.toggle('open');
    btn.textContent = open ? '▲ Hide Bracket' : '▼ View Bracket';
  }

  // ── Add player ─────────────────────────────────────────
  async function addPlayer(tid) {
    const input    = document.getElementById(`add-input-${tid}`);
    const username = input.value.trim();
    if (!username) return;

    input.disabled = true;
    try {
      const res = await apiFetch(`/tournaments/${tid}/players/add`, {
        method: 'PATCH',
        body: JSON.stringify({ username })
      });
      // Update local data
      const t = allTournaments.find(x => x.id === tid);
      if (t) { t.players = res.players; t.bracket = res.bracket; }
      input.value = '';
      refreshCard(tid);
      toast.success(`${username} added!`);
    } catch(e) {
      toast.error(e.message || 'Could not add player');
    } finally {
      input.disabled = false;
      input.focus();
    }
  }

  // ── Remove player ──────────────────────────────────────
  async function removePlayer(tid, username) {
    try {
      const res = await apiFetch(`/tournaments/${tid}/players/remove`, {
        method: 'PATCH',
        body: JSON.stringify({ username })
      });
      const t = allTournaments.find(x => x.id === tid);
      if (t) { t.players = res.players; t.bracket = res.bracket; }
      refreshCard(tid);
      toast.info(`${username} removed.`);
    } catch(e) {
      toast.error(e.message || 'Could not remove player');
    }
  }

  // ── Change status ──────────────────────────────────────
  async function changeStatus(tid, status) {
    try {
      await apiFetch(`/tournaments/${tid}/status`, {
        method: 'PATCH',
        body: JSON.stringify({ status })
      });
      const t = allTournaments.find(x => x.id === tid);
      if (t) t.status = status;
      refreshCard(tid);
      toast.success('Status updated!');
    } catch(e) {
      toast.error(e.message || 'Could not update status');
    }
  }

  // ── Delete ─────────────────────────────────────────────
  async function deleteTournament(tid) {
    if (!confirm('Delete this tournament?')) return;
    try {
      await apiFetch(`/tournaments/${tid}`, { method: 'DELETE' });
      allTournaments = allTournaments.filter(t => t.id !== tid);
      renderList();
      toast.success('Tournament deleted.');
    } catch(e) {
      toast.error(e.message || 'Could not delete');
    }
  }

  // ── Refresh a single card in-place ────────────────────
  function refreshCard(tid) {
    const t   = allTournaments.find(x => x.id === tid);
    const el  = document.getElementById(`tcard-${tid}`);
    const idx = allTournaments.indexOf(t);
    if (!t || !el) { renderList(); return; }
    el.outerHTML = renderCard(t, idx);
  }

  // ── Create tournament ──────────────────────────────────
  async function createTournament() {
    const name   = document.getElementById('t-name').value.trim();
    const mode   = document.getElementById('t-mode').value;
    const date   = document.getElementById('t-date').value;
    const status = document.getElementById('t-status').value;
    const desc   = document.getElementById('t-desc').value.trim();
    const errEl  = document.getElementById('create-error');

    errEl.classList.remove('show');
    if (!name) { errEl.textContent = 'Name is required.'; errEl.classList.add('show'); return; }

    const btn = document.getElementById('create-btn');
    btn.disabled = true;
    btn.innerHTML = 'Creating… <span class="spinner"></span>';

    try {
      const res = await apiFetch('/tournaments', {
        method: 'POST',
        body: JSON.stringify({ name, mode, date, status, description: desc, players: [] })
      });
      allTournaments.unshift(res.tournament);
      toggleForm(false);
      ['t-name','t-desc'].forEach(id => document.getElementById(id).value = '');
      renderList();
      toast.success(`"${name}" created!`);
    } catch(e) {
      errEl.textContent = e.message || 'Failed to create tournament.';
      errEl.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Tournament';
    }
  }
